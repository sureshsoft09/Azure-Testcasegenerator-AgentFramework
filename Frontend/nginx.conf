# nginx.conf – served via envsubst template (nginx:alpine default behaviour).
# BACKEND_URL must be set as an environment variable at container startup,
# e.g.  BACKEND_URL=https://testgen-backend.azurewebsites.net

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_types
        text/plain text/css text/javascript
        application/json application/javascript application/x-javascript
        image/svg+xml;
    gzip_min_length 1024;

    # ── API reverse-proxy → FastAPI backend ──────────────────────────────────
    location /api/ {
        proxy_pass         ${BACKEND_URL}/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $proxy_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
        proxy_send_timeout 300s;
    }

    # ── Static assets – long-lived cache ────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── React SPA fallback ───────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
