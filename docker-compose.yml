# docker-compose.yml – local integration testing
# Usage:
#   docker compose up --build
#
# All three services are built from their local Dockerfiles.
# Copy Backend/.env.example → Backend/.env and fill in real values before running.

services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: testgen-backend
    ports:
      - "8000:8000"
    env_file:
      - ./Backend/.env           # copy from .env.example and fill in values
    environment:
      APP_ENV: production
      CORS_ORIGINS: '["http://localhost:8080"]'
      JIRA_MCP_SERVER_URL: "http://jira-mcp:8002/sse"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── React/Vite frontend (nginx) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    container_name: testgen-frontend
    ports:
      - "8080:80"
    environment:
      # nginx template replaces ${BACKEND_URL} inside nginx.conf
      BACKEND_URL: "http://backend:8000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Jira MCP Server ─────────────────────────────────────────────────────────
  jira-mcp:
    build:
      context: "./MCP Servers/Jira MCP Server"
      dockerfile: Dockerfile
    container_name: testgen-jira-mcp
    ports:
      - "8002:8002"
    env_file:
      - "./MCP Servers/Jira MCP Server/.env"   # copy from .env.template and fill in values
    environment:
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8002"
      MCP_TRANSPORT: "http"
    restart: unless-stopped
